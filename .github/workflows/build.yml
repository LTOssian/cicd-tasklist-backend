name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run all tests with coverage
        run: npm run test:all:coverage

      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:latest,${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:${{ github.sha }}

      - name: Scan image with Trivy (CRITICAL & HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          args: --skip-files /usr/local/lib/node_modules/npm/node_modules/picomatch/package.json

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:latest
          format: spdx-json
          output: sbom.spdx.json

      - name: Push Docker image to DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:latest,${{ secrets.DOCKER_USERNAME }}/cicd-tasklist-backend:${{ github.sha }}
